name: Split core package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: "!startsWith(github.ref, 'refs/tags/')"
        uses: symplify/monorepo-split-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        with:
          package_directory: 'packages/laravix/cms'
          repository_organization: 'Laravix'
          repository_name: 'cms'
          branch: 'main'
          user_name: 'laravix-bot'
          user_email: 'bot@laravix.com'

      - if: "startsWith(github.ref, 'refs/tags/')"
        uses: symplify/monorepo-split-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        with:
          tag: ${{ github.ref_name }}
          package_directory: 'packages/laravix/cms'
          repository_organization: 'Laravix'
          repository_name: 'cms'
          branch: 'main'
          user_name: 'laravix-bot'
          user_email: 'bot@laravix.com'

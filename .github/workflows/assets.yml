name: Assets freshness

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: composer install --no-interaction --no-progress --no-scripts

      - run: npm ci

      - run: npm run build

      - name: Committed dist must match built assets
        run: git diff --exit-code packages/laravix/cms/dist
